<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerund vs Infinitive O'yini</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --card: #1a1640;
    --gerund: #f7971e;
    --infinitive: #56ccf2;
    --correct: #43e97b;
    --wrong: #f5576c;
    --text: #f0eeff;
    --muted: #8b82c4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, #302b63 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #24243e 0%, transparent 60%);
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--gerund), var(--infinitive));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 16px; text-align: center; }
  .mode-select { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .mode-btn {
    padding: 9px 20px; border-radius: 50px; border: 2px solid #2e2a60;
    background: var(--card); color: var(--muted); font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active, .mode-btn:hover { border-color: var(--infinitive); color: var(--infinitive); background: rgba(86,204,242,0.1); }
  .scorebar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
  .score-box {
    background: var(--card); border-radius: 14px; padding: 7px 16px;
    font-weight: 800; font-size: 0.9rem; border: 2px solid #2e2a60;
    display: flex; gap: 6px; align-items: center;
  }
  .progress-wrap { width: 100%; max-width: 620px; height: 8px; background: #2e2a60; border-radius: 99px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--gerund), var(--infinitive)); border-radius: 99px; transition: width 0.4s ease; }
  .card {
    background: var(--card); border: 2px solid #2e2a60; border-radius: 24px;
    padding: 26px 22px; max-width: 620px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(86,204,242,0.08), transparent); pointer-events: none;
  }
  .question-num { font-size: 0.75rem; color: var(--muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .category-tag {
    display: inline-block; font-size: 0.68rem; font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 3px 10px; border-radius: 50px; margin-bottom: 8px;
  }
  .cat-gerund { background: rgba(247,151,30,0.15); color: var(--gerund); border: 1px solid var(--gerund); }
  .cat-infinitive { background: rgba(86,204,242,0.15); color: var(--infinitive); border: 1px solid var(--infinitive); }
  .sentence { font-size: clamp(1rem, 3vw, 1.3rem); font-weight: 700; line-height: 1.7; margin-bottom: 8px; min-height: 60px; }
  .verb-highlight {
    background: linear-gradient(135deg, rgba(247,151,30,0.25), rgba(86,204,242,0.25));
    border-radius: 8px; padding: 2px 10px; border: 2px dashed #8b82c4;
    display: inline-block; font-style: italic; color: #d4c8ff;
  }
  .hint { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; font-style: italic; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 14px; }
  .choice-btn {
    padding: 13px 8px; border-radius: 16px; border: 3px solid transparent;
    font-family: 'Nunito', sans-serif; font-size: 0.92rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s ease;
  }
  .choice-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-btn.gerund-btn { background: linear-gradient(135deg, rgba(247,151,30,0.15), rgba(247,151,30,0.05)); border-color: var(--gerund); color: var(--gerund); }
  .choice-btn.infinitive-btn { background: linear-gradient(135deg, rgba(86,204,242,0.15), rgba(86,204,242,0.05)); border-color: var(--infinitive); color: var(--infinitive); }
  .choice-btn.correct-ans { background: linear-gradient(135deg, rgba(67,233,123,0.2), rgba(67,233,123,0.1)); border-color: var(--correct); color: var(--correct); animation: popIn 0.3s ease; }
  .choice-btn.wrong-ans { background: linear-gradient(135deg, rgba(245,87,108,0.2), rgba(245,87,108,0.1)); border-color: var(--wrong); color: var(--wrong); animation: shake 0.4s ease; }
  .choice-btn:disabled { cursor: default; }
  @keyframes popIn { 0%{transform:scale(0.95)} 60%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .explanation {
    background: rgba(255,255,255,0.04); border-radius: 14px; padding: 11px 14px;
    font-size: 0.83rem; line-height: 1.6; color: #c5beff; text-align: left;
    display: none; margin-bottom: 13px; border-left: 4px solid var(--infinitive);
  }
  .explanation.show { display: block; animation: fadeUp 0.3s ease; }
  .explanation strong { color: #fff; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .next-btn {
    padding: 11px 34px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--gerund), #f85032); color: white;
    font-family: 'Fredoka One', cursive; font-size: 1.05rem; cursor: pointer;
    display: none; margin: 0 auto; transition: all 0.2s ease;
    box-shadow: 0 6px 20px rgba(247,151,30,0.35);
  }
  .next-btn:hover { transform: translateY(-2px); }
  .next-btn.show { display: inline-block; animation: fadeUp 0.3s ease; }
  .legend { display: flex; gap: 20px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); font-weight: 700; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .results-screen { display: none; text-align: center; max-width: 520px; width: 100%; }
  .results-screen.show { display: block; animation: fadeUp 0.5s ease; }
  .results-emoji { font-size: 5rem; margin-bottom: 10px; }
  .results-title { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--gerund), var(--infinitive)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .results-score { font-size: 3rem; font-weight: 800; margin: 12px 0; }
  .results-msg { color: var(--muted); margin-bottom: 22px; font-size: 1rem; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn {
    padding: 13px 36px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--infinitive), #2f80ed); color: white;
    font-family: 'Fredoka One', cursive; font-size: 1.05rem; cursor: pointer;
    box-shadow: 0 8px 24px rgba(86,204,242,0.35); transition: all 0.2s ease;
  }
  .restart-btn:hover { transform: translateY(-2px); }
  .toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 10px 26px; border-radius: 50px; font-weight: 800; font-size: 0.95rem;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); z-index: 999; pointer-events: none;
  }
  .toast.correct { background: var(--correct); color: #0f3320; }
  .toast.wrong { background: var(--wrong); color: #3a000a; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<h1>🎯 Gerund vs Infinitive</h1>
<p class="subtitle">150 ta savol — eng ko'p ishlatiladigan fe'llar bo'yicha</p>

<div class="mode-select">
  <button class="mode-btn active" onclick="setMode(15,this)">🚀 15 ta</button>
  <button class="mode-btn" onclick="setMode(30,this)">⚡ 30 ta</button>
  <button class="mode-btn" onclick="setMode(50,this)">🔥 50 ta</button>
  <button class="mode-btn" onclick="setMode(150,this)">💯 150 ta</button>
</div>

<div class="scorebar">
  <div class="score-box">✅ <b id="correct-count">0</b></div>
  <div class="score-box">❌ <b id="wrong-count">0</b></div>
  <div class="score-box">🎯 <b id="q-num">1</b>/<b id="q-total">15</b></div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

<div class="card" id="game-card">
  <div class="question-num" id="q-label">SAVOL 1 / 15</div>
  <div id="cat-tag"></div>
  <div class="sentence" id="sentence-text"></div>
  <div class="hint" id="hint-text"></div>
  <div class="choices" id="choices-wrap"></div>
  <div class="explanation" id="explanation"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Keyingisi →</button>
</div>

<div class="results-screen" id="results-screen">
  <div class="results-emoji" id="r-emoji">🏆</div>
  <div class="results-title">O'yin tugadi!</div>
  <div class="results-score" id="r-score"></div>
  <div class="results-msg" id="r-msg"></div>
  <div class="btn-row">
    <button class="restart-btn" onclick="startGame()">🔄 Qayta</button>
    <button class="restart-btn" style="background:linear-gradient(135deg,var(--gerund),#f85032)" onclick="setMode(150,null);startGame()">💯 150 ta</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--gerund)"></div> Gerund (-ing)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--infinitive)"></div> Infinitive (to + V)</div>
</div>
<div class="toast" id="toast"></div>

<script>
const Q = [
// ENJOY
{s:"She enjoys ___ (read) books before bed.",a:"reading",c:["reading","to read"],t:"gerund",cat:"enjoy",ex:"<strong>enjoy + V-ing</strong> — enjoy har doim Gerund oladi. 'enjoy to read' — NOTO'G'RI."},
{s:"He enjoys ___ (play) chess with his grandfather.",a:"playing",c:["playing","to play"],t:"gerund",cat:"enjoy",ex:"<strong>enjoy + V-ing</strong>. Boshqalar ham: finish, avoid, mind, keep, miss, suggest."},
{s:"They enjoy ___ (watch) movies on weekends.",a:"watching",c:["watching","to watch"],t:"gerund",cat:"enjoy",ex:"<strong>enjoy</strong> Gerund bilan. Infinitive ishlatilmaydi."},
{s:"We enjoy ___ (hike) in the mountains every summer.",a:"hiking",c:["hiking","to hike"],t:"gerund",cat:"enjoy",ex:"<strong>enjoy hiking</strong> — to'g'ri. enjoy + V-ing."},
{s:"She enjoys ___ (cook) Italian food for her friends.",a:"cooking",c:["cooking","to cook"],t:"gerund",cat:"enjoy",ex:"<strong>enjoy</strong> doim -ing oladi. Istisno yo'q."},

// LIKE / LOVE / HATE
{s:"I like ___ (swim) in the ocean.",a:"swimming",c:["swimming","to swim"],t:"gerund",cat:"like/love/hate",ex:"<strong>like + -ing</strong> — umumiy odat. like + to — ma'lum bir paytda xohish. Bu yerda odat."},
{s:"She loves ___ (dance) at parties.",a:"dancing",c:["dancing","to dance"],t:"gerund",cat:"like/love/hate",ex:"<strong>love + -ing</strong> — qilishdan zavq olish, umumiy sevimli ish."},
{s:"He hates ___ (wait) in long queues.",a:"waiting",c:["waiting","to wait"],t:"gerund",cat:"like/love/hate",ex:"<strong>hate + -ing</strong> — odatdan nafratlanish."},
{s:"They love ___ (travel) to new countries.",a:"traveling",c:["traveling","to travel"],t:"gerund",cat:"like/love/hate",ex:"<strong>love + -ing</strong> — umumiy qiziqish."},
{s:"I hate ___ (get) up early on Mondays.",a:"getting",c:["getting","to get"],t:"gerund",cat:"like/love/hate",ex:"<strong>hate + -ing</strong> — odatdan nafratlanish."},

// AVOID
{s:"She avoids ___ (eat) junk food.",a:"eating",c:["eating","to eat"],t:"gerund",cat:"avoid",ex:"<strong>avoid + V-ing</strong> — har doim Gerund. 'avoid to eat' — NOTO'G'RI."},
{s:"He avoids ___ (drive) during rush hour.",a:"driving",c:["driving","to drive"],t:"gerund",cat:"avoid",ex:"<strong>avoid + V-ing</strong> — qilmaslikka harakat qilish."},
{s:"They avoid ___ (make) eye contact with strangers.",a:"making",c:["making","to make"],t:"gerund",cat:"avoid",ex:"<strong>avoid</strong> Infinitive qabul qilmaydi."},
{s:"I always avoid ___ (argue) with my boss.",a:"arguing",c:["arguing","to argue"],t:"gerund",cat:"avoid",ex:"<strong>avoid arguing</strong> — to'g'ri. avoid + V-ing."},
{s:"She avoids ___ (spend) too much money.",a:"spending",c:["spending","to spend"],t:"gerund",cat:"avoid",ex:"<strong>avoid + -ing</strong>. Bu fe'l hech qachon Infinitive olmaydi."},

// FINISH
{s:"He finished ___ (write) the report at midnight.",a:"writing",c:["writing","to write"],t:"gerund",cat:"finish",ex:"<strong>finish + V-ing</strong> — ishni tamom qilish."},
{s:"She finished ___ (read) the novel in two days.",a:"reading",c:["reading","to read"],t:"gerund",cat:"finish",ex:"<strong>finish reading</strong> — to'g'ri. 'finish to read' — NOTO'G'RI."},
{s:"They finished ___ (build) the bridge last week.",a:"building",c:["building","to build"],t:"gerund",cat:"finish",ex:"<strong>finish + V-ing</strong> qoidasi."},
{s:"I finally finished ___ (clean) the whole house.",a:"cleaning",c:["cleaning","to clean"],t:"gerund",cat:"finish",ex:"<strong>finish</strong> Gerund bilan. Qoida: finish + V-ing."},

// SUGGEST
{s:"She suggested ___ (take) the bus instead of driving.",a:"taking",c:["taking","to take"],t:"gerund",cat:"suggest",ex:"<strong>suggest + V-ing</strong>. HECH QACHON Infinitive olmaydi. 'suggested to take' — NOTO'G'RI."},
{s:"He suggested ___ (open) a new restaurant downtown.",a:"opening",c:["opening","to open"],t:"gerund",cat:"suggest",ex:"<strong>suggest + V-ing</strong>. Bu qoida o'zgarmas."},
{s:"They suggested ___ (meet) at the café at noon.",a:"meeting",c:["meeting","to meet"],t:"gerund",cat:"suggest",ex:"<strong>suggest meeting</strong> — to'g'ri. suggest + V-ing."},

// MIND
{s:"Would you mind ___ (close) the door, please?",a:"closing",c:["closing","to close"],t:"gerund",cat:"mind",ex:"<strong>mind + V-ing</strong> — 'Would you mind closing?' standart iltimos shakli."},
{s:"I don't mind ___ (work) late if necessary.",a:"working",c:["working","to work"],t:"gerund",cat:"mind",ex:"<strong>mind + V-ing</strong> — ijobiy/salbiy shaklda ham Gerund."},
{s:"Does she mind ___ (share) her office?",a:"sharing",c:["sharing","to share"],t:"gerund",cat:"mind",ex:"<strong>mind</strong> faqat Gerund bilan. 'Does she mind sharing?' — to'g'ri."},

// KEEP
{s:"He kept ___ (talk) even after the meeting ended.",a:"talking",c:["talking","to talk"],t:"gerund",cat:"keep",ex:"<strong>keep + V-ing</strong> — davom etmoq, to'xtatmaslik."},
{s:"She keeps ___ (forget) her keys at home.",a:"forgetting",c:["forgetting","to forget"],t:"gerund",cat:"keep",ex:"<strong>keep + V-ing</strong> — takror-takror qilish."},
{s:"They kept ___ (run) even when they were tired.",a:"running",c:["running","to run"],t:"gerund",cat:"keep",ex:"<strong>keep running</strong> — to'xtatmasdan davom etish."},
{s:"He keeps ___ (interrupt) me when I'm speaking.",a:"interrupting",c:["interrupting","to interrupt"],t:"gerund",cat:"keep",ex:"<strong>keep + V-ing</strong> — bezovta harakat takrorlanmoqda."},

// MISS
{s:"She misses ___ (see) her old friends.",a:"seeing",c:["seeing","to see"],t:"gerund",cat:"miss",ex:"<strong>miss + V-ing</strong> — sog'inish, yo'qligidan afsuslanish."},
{s:"He misses ___ (eat) his mother's cooking.",a:"eating",c:["eating","to eat"],t:"gerund",cat:"miss",ex:"<strong>miss + V-ing</strong>. 'miss to eat' — NOTO'G'RI."},
{s:"I miss ___ (live) in my hometown.",a:"living",c:["living","to live"],t:"gerund",cat:"miss",ex:"<strong>miss living</strong> — to'g'ri. miss + V-ing."},

// CONSIDER
{s:"She is considering ___ (change) her career.",a:"changing",c:["changing","to change"],t:"gerund",cat:"consider",ex:"<strong>consider + V-ing</strong> — mulohaza qilmoq. 'considering to change' — NOTO'G'RI."},
{s:"He considered ___ (move) to another city.",a:"moving",c:["moving","to move"],t:"gerund",cat:"consider",ex:"<strong>consider + V-ing</strong>. Infinitive qabul qilmaydi."},
{s:"They are considering ___ (buy) a new house.",a:"buying",c:["buying","to buy"],t:"gerund",cat:"consider",ex:"<strong>consider</strong> Gerund bilan. O'ylash + V-ing."},

// ADMIT / DENY
{s:"He admitted ___ (steal) the money.",a:"stealing",c:["stealing","to steal"],t:"gerund",cat:"admit/deny",ex:"<strong>admit + V-ing</strong> — itiroflar bildiruvchi fe'llar Gerund oladi: admit, deny, confess."},
{s:"She denied ___ (break) the vase.",a:"breaking",c:["breaking","to break"],t:"gerund",cat:"admit/deny",ex:"<strong>deny + V-ing</strong> — inkor qilish + Gerund."},
{s:"He admitted ___ (make) a serious mistake.",a:"making",c:["making","to make"],t:"gerund",cat:"admit/deny",ex:"<strong>admit + V-ing</strong>. 'admit to make' — NOTO'G'RI."},
{s:"She denied ___ (send) that email.",a:"sending",c:["sending","to send"],t:"gerund",cat:"admit/deny",ex:"<strong>deny + V-ing</strong> qoidasi o'zgarmas."},

// IMAGINE
{s:"I can't imagine ___ (live) without the internet.",a:"living",c:["living","to live"],t:"gerund",cat:"imagine",ex:"<strong>imagine + V-ing</strong> — tasavvur qilish + Gerund."},
{s:"She imagined ___ (win) the lottery someday.",a:"winning",c:["winning","to win"],t:"gerund",cat:"imagine",ex:"<strong>imagine + V-ing</strong>. Infinitive bu yerda ishlatilmaydi."},

// PRACTISE
{s:"He practises ___ (speak) English every morning.",a:"speaking",c:["speaking","to speak"],t:"gerund",cat:"practise",ex:"<strong>practise + V-ing</strong> — mashq qilish + Gerund."},
{s:"She practises ___ (play) the piano for two hours daily.",a:"playing",c:["playing","to play"],t:"gerund",cat:"practise",ex:"<strong>practise + V-ing</strong>. 'practise to play' — NOTO'G'RI."},

// RISK
{s:"He risked ___ (lose) his job by arriving late.",a:"losing",c:["losing","to lose"],t:"gerund",cat:"risk",ex:"<strong>risk + V-ing</strong> — xavf ostiga qo'yish + Gerund."},
{s:"She risked ___ (hurt) herself by climbing.",a:"hurting",c:["hurting","to hurt"],t:"gerund",cat:"risk",ex:"<strong>risk + V-ing</strong>. Infinitive qabul qilmaydi."},

// GIVE UP / QUIT
{s:"He gave up ___ (smoke) three years ago.",a:"smoking",c:["smoking","to smoke"],t:"gerund",cat:"give up/quit",ex:"<strong>give up + V-ing</strong> — tark etish, qilishni to'xtatish."},
{s:"She quit ___ (work) at the company last month.",a:"working",c:["working","to work"],t:"gerund",cat:"give up/quit",ex:"<strong>quit + V-ing</strong>. 'quit working' — to'xtatish."},
{s:"He gave up ___ (try) to fix the old car.",a:"trying",c:["trying","to try"],t:"gerund",cat:"give up/quit",ex:"<strong>give up + V-ing</strong> — harakat qilishni to'xtatish."},
{s:"She quit ___ (eat) meat last year.",a:"eating",c:["eating","to eat"],t:"gerund",cat:"give up/quit",ex:"<strong>quit + V-ing</strong> qoidasi."},

// POSTPONE / DELAY / PUT OFF
{s:"She postponed ___ (make) a decision until next week.",a:"making",c:["making","to make"],t:"gerund",cat:"postpone/delay",ex:"<strong>postpone + V-ing</strong> — kechiktirish + Gerund."},
{s:"He delayed ___ (tell) her the bad news.",a:"telling",c:["telling","to tell"],t:"gerund",cat:"postpone/delay",ex:"<strong>delay + V-ing</strong>. 'delay telling' — kechiktirish."},
{s:"They put off ___ (fix) the roof until summer.",a:"fixing",c:["fixing","to fix"],t:"gerund",cat:"postpone/delay",ex:"<strong>put off + V-ing</strong>. 'put off fixing' — keyinga qoldirish."},

// WANT
{s:"I want ___ (learn) a new language this year.",a:"to learn",c:["learning","to learn"],t:"infinitive",cat:"want",ex:"<strong>want + to + V</strong> — xohish bildiruvchi fe'llar Infinitive oladi."},
{s:"She wants ___ (become) a doctor.",a:"to become",c:["becoming","to become"],t:"infinitive",cat:"want",ex:"<strong>want + to + V</strong>. 'want becoming' — NOTO'G'RI."},
{s:"He wants ___ (buy) a new car next year.",a:"to buy",c:["buying","to buy"],t:"infinitive",cat:"want",ex:"<strong>want</strong> doim Infinitive bilan. want to buy, want to go, want to see."},
{s:"They want ___ (visit) Rome this summer.",a:"to visit",c:["visiting","to visit"],t:"infinitive",cat:"want",ex:"<strong>want to visit</strong> — to'g'ri. want + Infinitive."},
{s:"We want ___ (start) a new project next month.",a:"to start",c:["starting","to start"],t:"infinitive",cat:"want",ex:"<strong>want + to + V</strong> — xohish. Gerund ishlatilmaydi."},

// DECIDE
{s:"She decided ___ (quit) her job.",a:"to quit",c:["quitting","to quit"],t:"infinitive",cat:"decide",ex:"<strong>decide + to + V</strong> — qaror qabul qilish + Infinitive."},

{s:"It's no use ___ (complain) about the weather.",a:"complaining",c:["complaining","to complain"],t:"gerund",cat:"it's no use",ex:"<strong>it's no use + V-ing</strong> — foydasiz. it's no use complaining."},
{s:"There's no point in ___ (wait) any longer.",a:"waiting",c:["waiting","to wait"],t:"gerund",cat:"no point in",ex:"<strong>no point in + V-ing</strong> — 'in' prepositiondan keyin Gerund."},
{s:"She ended up ___ (stay) at the hotel for three nights.",a:"staying",c:["staying","to stay"],t:"gerund",cat:"end up",ex:"<strong>end up + V-ing</strong> — oxirida shunday bo'lib qolmoq."},
{s:"He ended up ___ (take) a taxi home.",a:"taking",c:["taking","to take"],t:"gerund",cat:"end up",ex:"<strong>end up + V-ing</strong>. end up taking — to'g'ri."},
{s:"I'm having difficulty ___ (understand) this grammar rule.",a:"understanding",c:["understanding","to understand"],t:"gerund",cat:"difficulty/trouble",ex:"<strong>have difficulty + V-ing</strong> — qiyinchilik bilan + Gerund."},
{s:"She has trouble ___ (sleep) when she's stressed.",a:"sleeping",c:["sleeping","to sleep"],t:"gerund",cat:"difficulty/trouble",ex:"<strong>have trouble + V-ing</strong>. trouble sleeping — qiynalish."},
{s:"He is busy ___ (prepare) for the exam.",a:"preparing",c:["preparing","to prepare"],t:"gerund",cat:"be busy",ex:"<strong>be busy + V-ing</strong> — band bo'lmoq + Gerund."},
{s:"She is busy ___ (write) her thesis.",a:"writing",c:["writing","to write"],t:"gerund",cat:"be busy",ex:"<strong>be busy + V-ing</strong>. busy writing — band."},
{s:"It's worth ___ (try) this new restaurant.",a:"trying",c:["trying","to try"],t:"gerund",cat:"worth",ex:"<strong>worth + V-ing</strong>. worth trying — ko'rib/sinab ko'rishga arziydi."},
];

let questions=[], current=0, correct=0, wrong=0, answered=false, MODE=15;

function setMode(n,btn){
  MODE=n;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.mode-btn').forEach(b=>{ if(b.textContent.includes(n)) b.classList.add('active'); });
  startGame();
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function startGame(){
  questions=shuffle(Q).slice(0,Math.min(MODE,Q.length));
  current=0; correct=0; wrong=0; answered=false;
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('game-card').style.display='block';
  document.getElementById('q-total').textContent=questions.length;
  updateScore(); renderQuestion();
}

function renderQuestion(){
  const q=questions[current]; answered=false;
  document.getElementById('q-label').textContent=`SAVOL ${current+1} / ${questions.length}`;
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('progress-bar').style.width=(current/questions.length*100)+'%';
  document.getElementById('cat-tag').innerHTML=`<span class="category-tag ${q.t==='gerund'?'cat-gerund':'cat-infinitive'}">${q.cat}</span>`;
  document.getElementById('sentence-text').innerHTML=q.s.replace(/___\s*\([^)]+\)/g,'<span class="verb-highlight">___</span>');
  document.getElementById('hint-text').textContent=`Fe'l: "${q.a}"`;
  const wrap=document.getElementById('choices-wrap');
  wrap.innerHTML='';
  shuffle(q.c).forEach(choice=>{
    const isInf=choice.startsWith('to ')||choice.startsWith('not to');
    const btn=document.createElement('button');
    btn.className='choice-btn '+(isInf?'infinitive-btn':'gerund-btn');
    btn.innerHTML=`<div style="font-size:0.66rem;opacity:0.7;margin-bottom:2px">${isInf?'INFINITIVE':'GERUND'}</div>${choice}`;
    btn.onclick=()=>checkAnswer(choice,btn);
    wrap.appendChild(btn);
  });
  document.getElementById('explanation').className='explanation';
  document.getElementById('next-btn').className='next-btn';
}

function checkAnswer(choice,btn){
  if(answered) return; answered=true;
  const q=questions[current];
  const isCorrect=choice===q.a;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim().includes(q.a)) b.classList.add('correct-ans');
  });
  if(isCorrect){ correct++; showToast("✅ To'g'ri!",'correct'); }
  else { wrong++; btn.classList.add('wrong-ans'); showToast("❌ Noto'g'ri!",'wrong'); }
  updateScore();
  const ex=document.getElementById('explanation');
  ex.innerHTML=q.ex; ex.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion(){
  current++;
  if(current>=questions.length) showResults();
  else renderQuestion();
}

function showResults(){
  document.getElementById('game-card').style.display='none';
  const pct=Math.round(correct/questions.length*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='Mukammal! Siz Gerund/Infinitive ustasisiz! 🎉';}
  else if(pct>=75){emoji='🌟';msg='Juda yaxshi! Oz-moz mashq va siz profesionalsiz!';}
  else if(pct>=55){emoji='💪';msg='Yaxshi boshlanish! Qoidalarni qayta ko\'rib chiqing.';}
  else{emoji='📚';msg='Qoidalarni yaxshilab o\'rganing va yana urinib ko\'ring!';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-score').innerHTML=`<span style="color:var(--correct)">${correct}</span>/${questions.length} <span style="font-size:1rem;color:var(--muted)">(${pct}%)</span>`;
  document.getElementById('r-msg').textContent=msg;
  document.getElementById('results-screen').classList.add('show');
}

function updateScore(){
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('wrong-count').textContent=wrong;
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>{t.className=`toast ${type}`;},1800);
}

startGame();
</script>

</html>
